name: Test if-no-files-found error behavior
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: upload
        uses: .
        continue-on-error: true
        with:
          name: test-no-files-error-artifact
          path: /tmp/nonexistent-path-that-does-not-exist/**
          if-no-files-found: error

      - name: Assert action failed as expected
        env:
          OUTCOME: ${{ steps.upload.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with if-no-files-found=error, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when no files found with error mode"
