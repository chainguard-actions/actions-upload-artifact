name: Test if-no-files-found error behavior
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: upload
        uses: .
        continue-on-error: true
        with:
          name: error-artifact
          path: /tmp/nonexistent-path-that-does-not-exist/**
          if-no-files-found: error

      - name: Assert action failed (error causes failure)
        run: |
          echo "outcome: ${{ steps.upload.outcome }}"
          OUTCOME="${{ steps.upload.outcome }}"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected failure with if-no-files-found=error, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed with error when no files found"
