name: Test if-no-files-found ignore behavior
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: upload
        uses: .
        with:
          name: ignored-artifact
          path: /tmp/nonexistent-path-that-does-not-exist/**
          if-no-files-found: ignore

      - name: Assert action succeeded (ignore does not fail)
        run: |
          echo "outcome: ${{ steps.upload.outcome }}"
          OUTCOME="${{ steps.upload.outcome }}"
          if [ "$OUTCOME" != "success" ]; then
            echo "FAIL: expected success with if-no-files-found=ignore, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action succeeded silently with ignore when no files found"
