name: Test if-no-files-found ignore behavior
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: upload
        uses: .
        with:
          name: test-no-files-ignore-artifact
          path: /tmp/nonexistent-path-that-does-not-exist/**
          if-no-files-found: ignore

      - name: Assert action did not fail (ignore mode)
        run: |
          echo "PASS: action completed without failure in ignore mode"

      - name: Assert artifact-id is empty (no files uploaded)
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        run: |
          echo "artifact-id: '$ARTIFACT_ID'"
          if [ -n "$ARTIFACT_ID" ]; then
            echo "FAIL: expected artifact-id to be empty when no files found"
            exit 1
          fi
          echo "PASS: artifact-id is empty as expected"
