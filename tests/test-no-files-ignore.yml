name: Test artifact upload with no files found ignored
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: upload
        uses: .
        with:
          name: no-files-artifact
          path: /tmp/nonexistent-path-that-does-not-exist/*.txt
          if-no-files-found: ignore
        continue-on-error: true
      - name: Assert action handled missing files gracefully
        run: |
          echo "Upload step completed with if-no-files-found=ignore"
          echo "artifact-id: ${{ steps.upload.outputs.artifact-id }}"
          echo "PASS: action executed with if-no-files-found=ignore"
