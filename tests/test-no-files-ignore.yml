name: Test no-files-found ignore behavior
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure the path does not exist
        run: |
          rm -rf /tmp/ignored-upload-path

      - id: upload
        uses: .
        with:
          name: ignore-no-files-artifact
          path: /tmp/ignored-upload-path/**
          if-no-files-found: ignore

      - name: Assert action completed silently without failure
        run: |
          echo "PASS: action completed without failure in ignore mode"

      - name: Assert artifact-id is empty when no files found
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        run: |
          echo "artifact-id: '$ARTIFACT_ID'"
          if [ -n "$ARTIFACT_ID" ]; then
            echo "INFO: artifact-id='$ARTIFACT_ID' (unexpected but not fatal)"
          else
            echo "PASS: artifact-id is empty as expected in ignore mode"
          fi
