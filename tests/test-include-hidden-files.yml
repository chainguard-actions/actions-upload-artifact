name: Test artifact upload with hidden files included
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test directory with hidden files
        run: |
          mkdir -p /tmp/hidden-files-test
          echo "visible content" > /tmp/hidden-files-test/visible.txt
          echo "hidden content" > /tmp/hidden-files-test/.hidden-file
          echo "another hidden" > /tmp/hidden-files-test/.env

      - id: upload
        uses: .
        continue-on-error: true
        with:
          name: hidden-files-artifact
          path: /tmp/hidden-files-test/
          if-no-files-found: error
          include-hidden-files: 'true'

      - name: Assert action ran with include-hidden-files=true
        run: |
          echo "outcome: ${{ steps.upload.outcome }}"
          OUTCOME="${{ steps.upload.outcome }}"
          # Under act, upload may fail due to no artifact backend, but the action
          # should have at least started and attempted the upload (not a setup error).
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with include-hidden-files=true, outcome=$OUTCOME"
          else
            echo "FAIL: unexpected outcome=$OUTCOME"
            exit 1
          fi
