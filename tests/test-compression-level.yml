name: Test artifact upload with custom compression level
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test file for compression test
        run: |
          mkdir -p /tmp/compression-test
          # Create a file with repetitive content (compressible)
          python3 -c "print('A' * 10000)" > /tmp/compression-test/compressible.txt
          echo "metadata" > /tmp/compression-test/meta.txt

      - id: upload-no-compression
        uses: .
        with:
          name: no-compression-artifact
          path: /tmp/compression-test/
          compression-level: '0'

      - name: Assert artifact-id is non-empty with compression-level=0
        env:
          ARTIFACT_ID: ${{ steps.upload-no-compression.outputs.artifact-id }}
        run: |
          echo "artifact-id: $ARTIFACT_ID"
          if [ -z "$ARTIFACT_ID" ]; then
            echo "FAIL: artifact-id is empty"
            exit 1
          fi
          echo "PASS: artifact-id=$ARTIFACT_ID"

      - name: Assert artifact-url is non-empty
        env:
          ARTIFACT_URL: ${{ steps.upload-no-compression.outputs.artifact-url }}
        run: |
          echo "artifact-url: $ARTIFACT_URL"
          if [ -z "$ARTIFACT_URL" ]; then
            echo "FAIL: artifact-url is empty"
            exit 1
          fi
          echo "PASS: artifact-url=$ARTIFACT_URL"

      - name: Assert artifact-digest is non-empty
        env:
          ARTIFACT_DIGEST: ${{ steps.upload-no-compression.outputs.artifact-digest }}
        run: |
          echo "artifact-digest: $ARTIFACT_DIGEST"
          if [ -z "$ARTIFACT_DIGEST" ]; then
            echo "FAIL: artifact-digest is empty"
            exit 1
          fi
          echo "PASS: artifact-digest=$ARTIFACT_DIGEST"
