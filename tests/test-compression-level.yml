name: Test artifact upload with compression level 0
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test files to upload
        run: |
          mkdir -p /tmp/compression-test
          echo "test content for compression level 0" > /tmp/compression-test/data.txt
          echo "more test data" > /tmp/compression-test/data2.txt

      - id: upload
        uses: .
        continue-on-error: true
        with:
          name: compression-test-artifact
          path: /tmp/compression-test/
          if-no-files-found: error
          compression-level: '0'

      - name: Assert action ran with compression-level 0
        run: |
          echo "outcome: ${{ steps.upload.outcome }}"
          OUTCOME="${{ steps.upload.outcome }}"
          # Under act, upload may fail due to no artifact backend, but the action
          # should have at least started and attempted the upload (not a setup error).
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with compression-level=0, outcome=$OUTCOME"
          else
            echo "FAIL: unexpected outcome=$OUTCOME"
            exit 1
          fi
