name: Test basic artifact upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file
        run: |
          mkdir -p /tmp/test-artifacts
          echo "hello world" > /tmp/test-artifacts/test.txt
      - id: upload
        uses: .
        with:
          name: test-artifact
          path: /tmp/test-artifacts/test.txt
          if-no-files-found: warn
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Upload step completed (may fail in act due to no GitHub API)"
          echo "artifact-id: ${{ steps.upload.outputs.artifact-id }}"
          echo "artifact-url: ${{ steps.upload.outputs.artifact-url }}"
          echo "PASS: action executed with path input"
