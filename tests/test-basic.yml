name: Test basic upload with path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create artifact file
        run: |
          mkdir -p /tmp/artifact-test
          echo "hello artifact" > /tmp/artifact-test/output.txt

      - id: upload
        uses: .
        continue-on-error: true
        with:
          name: test-artifact
          path: /tmp/artifact-test/output.txt
          if-no-files-found: warn

      - name: Assert action was invoked (outputs present or action ran)
        run: |
          echo "artifact-id: ${{ steps.upload.outputs.artifact-id }}"
          echo "artifact-url: ${{ steps.upload.outputs.artifact-url }}"
          echo "artifact-digest: ${{ steps.upload.outputs.artifact-digest }}"
          echo "outcome: ${{ steps.upload.outcome }}"
          # The action may fail in act due to no GitHub API, but it must have run
          if [ "${{ steps.upload.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran (outcome=${{ steps.upload.outcome }})"
