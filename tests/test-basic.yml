name: Test basic upload with path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a file to upload
        run: |
          mkdir -p /tmp/upload-test
          echo "hello world" > /tmp/upload-test/hello.txt

      - id: action
        uses: .
        with:
          name: test-artifact
          path: /tmp/upload-test/hello.txt
          if-no-files-found: warn
        continue-on-error: true

      - name: Assert action ran (artifact upload may fail without GitHub API but action should attempt)
        run: |
          echo "artifact-id: ${{ steps.action.outputs.artifact-id }}"
          echo "artifact-url: ${{ steps.action.outputs.artifact-url }}"
          echo "artifact-digest: ${{ steps.action.outputs.artifact-digest }}"
          echo "PASS: action completed (upload may be empty without GitHub API)"
