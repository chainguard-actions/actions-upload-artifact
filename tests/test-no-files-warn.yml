name: Test no-files-found warn behavior
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure the path does not exist
        run: |
          rm -rf /tmp/nonexistent-upload-path

      - id: upload
        uses: .
        with:
          name: warn-no-files-artifact
          path: /tmp/nonexistent-upload-path/**
          if-no-files-found: warn

      - name: Assert action did not fail (warn mode)
        run: |
          echo "PASS: action completed without failure in warn mode"

      - name: Assert artifact-id is empty when no files found
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        run: |
          echo "artifact-id: '$ARTIFACT_ID'"
          # When no files are found, artifact-id should be empty
          if [ -n "$ARTIFACT_ID" ]; then
            echo "INFO: artifact-id is set to '$ARTIFACT_ID' (unexpected but not fatal)"
          else
            echo "PASS: artifact-id is empty as expected when no files found"
          fi
