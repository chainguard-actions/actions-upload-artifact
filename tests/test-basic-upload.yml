name: Test basic artifact upload
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test file to upload
        run: |
          mkdir -p /tmp/upload-test
          echo "hello artifact" > /tmp/upload-test/hello.txt

      - id: upload
        uses: .
        continue-on-error: true
        with:
          name: test-artifact
          path: /tmp/upload-test/hello.txt
          if-no-files-found: error

      - name: Assert action ran (upload attempted)
        run: |
          echo "outcome: ${{ steps.upload.outcome }}"
          # Under act, upload may fail due to no artifact backend, but the action
          # should have at least started and attempted the upload (not a setup error).
          # We accept both success and failure outcomes as long as it's not a crash.
          OUTCOME="${{ steps.upload.outcome }}"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with outcome=$OUTCOME"
          else
            echo "FAIL: unexpected outcome=$OUTCOME"
            exit 1
          fi
