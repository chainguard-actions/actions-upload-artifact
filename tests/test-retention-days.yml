name: Test upload with retention-days input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file to upload
        run: |
          mkdir -p /tmp/test-retention
          echo "retention test content" > /tmp/test-retention/data.txt
      - id: upload
        uses: .
        with:
          name: retention-test-artifact
          path: /tmp/test-retention/data.txt
          retention-days: 5
          if-no-files-found: warn
        continue-on-error: true
      - name: Assert action ran with retention-days input
        run: |
          echo "artifact-id: ${{ steps.upload.outputs.artifact-id }}"
          echo "artifact-url: ${{ steps.upload.outputs.artifact-url }}"
          echo "artifact-digest: ${{ steps.upload.outputs.artifact-digest }}"
          echo "outcome: ${{ steps.upload.outcome }}"
          # In act environment, upload may fail due to no GitHub API access.
          # We verify the action was invoked and produced some outcome.
          if [ "${{ steps.upload.outcome }}" = "" ]; then
            echo "FAIL: action did not run at all"
            exit 1
          fi
          echo "PASS: action ran with retention-days=5, outcome=${{ steps.upload.outcome }}"
