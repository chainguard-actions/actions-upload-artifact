name: Test retention-days input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create artifact file
        run: |
          mkdir -p /tmp/retention-test
          echo "retention days test content" > /tmp/retention-test/artifact.txt

      - id: action
        uses: .
        with:
          name: retention-days-artifact
          path: /tmp/retention-test/artifact.txt
          retention-days: 5
          if-no-files-found: error
        continue-on-error: true

      - name: Assert action ran (upload may fail outside real GitHub, but input was accepted)
        env:
          OUTCOME: ${{ steps.action.outcome }}
          ARTIFACT_ID: ${{ steps.action.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.action.outputs.artifact-url }}
        run: |
          echo "outcome: $OUTCOME"
          echo "artifact-id: $ARTIFACT_ID"
          echo "artifact-url: $ARTIFACT_URL"
          # Under act, the upload API is not available, so the action may fail.
          # We verify the action was invoked (outcome is success or failure, not skipped)
          # and that the retention-days input was accepted without a parse/validation error.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with retention-days input (outcome=$OUTCOME)"
