name: Test artifact upload with retention days
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create test file
        run: |
          mkdir -p /tmp/test-artifacts
          echo "retention test content" > /tmp/test-artifacts/retention-test.txt
      - id: upload
        uses: .
        with:
          name: retention-test-artifact
          path: /tmp/test-artifacts/retention-test.txt
          retention-days: 5
          if-no-files-found: warn
          compression-level: '6'
        continue-on-error: true
      - name: Assert action ran with retention-days input
        run: |
          echo "Upload step completed with retention-days=5"
          echo "artifact-id: ${{ steps.upload.outputs.artifact-id }}"
          echo "artifact-url: ${{ steps.upload.outputs.artifact-url }}"
          echo "PASS: action executed with retention-days input"
